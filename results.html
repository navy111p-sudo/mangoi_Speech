<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangoi Speaking Practice - 결과 보기</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192x192.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif; min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex; flex-direction: column; align-items: center;
            overflow-y: auto; position: relative;
        }
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: floatOrb 8s ease-in-out infinite; z-index: 0; }
        .bg-orb:nth-child(1) { width: 350px; height: 350px; background: linear-gradient(135deg, #ff9ff3, #f368e0); top: -80px; left: -80px; }
        .bg-orb:nth-child(2) { width: 300px; height: 300px; background: linear-gradient(135deg, #feca57, #ff6b6b); bottom: -60px; right: -60px; animation-delay: -4s; }
        @keyframes floatOrb { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(20px,-20px) scale(1.05); } 66% { transform: translate(-15px,15px) scale(0.95); } }
        .container { position: relative; z-index: 10; text-align: center; padding: 30px 20px; max-width: 500px; width: 100%; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.85rem; margin-bottom: 24px; transition: color 0.3s; }
        .back-link:hover { color: rgba(255,255,255,0.8); }
        .logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #ff9ff3, #f368e0); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 8px 32px rgba(255,159,243,0.3); margin-bottom: 16px; }
        .title { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.5); font-size: 0.85rem; font-weight: 300; margin-bottom: 32px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .stat-card { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 20px 16px; }
        .stat-value { font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; }
        .stat-card:nth-child(1) .stat-value { background: linear-gradient(135deg, #feca57, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-card:nth-child(2) .stat-value { background: linear-gradient(135deg, #48dbfb, #0abde3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-card:nth-child(3) .stat-value { background: linear-gradient(135deg, #ff9ff3, #f368e0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-card:nth-child(4) .stat-value { background: linear-gradient(135deg, #55efc4, #00b894); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-label { color: rgba(255,255,255,0.45); font-size: 0.75rem; font-weight: 400; }
        .section-title { color: rgba(255,255,255,0.7); font-size: 0.9rem; font-weight: 600; text-align: left; margin-bottom: 12px; }
        .history-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
        .history-item { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; }
        .history-score { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; color: #fff; flex-shrink: 0; }
        .score-high { background: linear-gradient(135deg, #55efc4, #00b894); }
        .score-mid { background: linear-gradient(135deg, #feca57, #ff6b6b); }
        .score-low { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        .history-info { text-align: left; flex: 1; }
        .history-topic { color: #fff; font-size: 0.9rem; font-weight: 500; margin-bottom: 2px; }
        .history-date { color: rgba(255,255,255,0.35); font-size: 0.75rem; }
        .empty-state { background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.15); border-radius: 18px; padding: 40px 20px; color: rgba(255,255,255,0.35); font-size: 0.85rem; }
        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .start-btn { display: inline-block; margin-top: 16px; padding: 12px 28px; background: linear-gradient(135deg, #ff9ff3, #f368e0); border: none; border-radius: 12px; color: #fff; font-size: 0.9rem; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; text-decoration: none; transition: all 0.3s; }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,159,243,0.35); }
        .container { opacity: 0; animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
        @media (max-width: 480px) { .title { font-size: 1.3rem; } .stat-value { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="container">
        <a href="index.html" class="back-link">← 대시보드로 돌아가기</a>
        <div class="logo-icon">📊</div>
        <h1 class="title">결과 보기</h1>
        <p class="subtitle">학습 기록과 성적을 확인하세요</p>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value">0</div><div class="stat-label">총 연습 횟수</div></div>
            <div class="stat-card"><div class="stat-value">0점</div><div class="stat-label">평균 점수</div></div>
            <div class="stat-card"><div class="stat-value">0분</div><div class="stat-label">총 학습 시간</div></div>
            <div class="stat-card"><div class="stat-value">0일</div><div class="stat-label">연속 학습</div></div>
        </div>
        <div class="section-title">최근 학습 기록</div>
        <div class="empty-state">
            <div class="empty-icon">📝</div>
            <p>아직 학습 기록이 없어요</p>
            <p>스피킹 연습을 시작해보세요!</p>
            <a href="practice.html" class="start-btn">연습 시작하기</a>
        </div>
    </div>
</body>
</html>
