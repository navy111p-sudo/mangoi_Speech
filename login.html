<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangoi Speaking Practice - 로그인</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192x192.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif; min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: floatOrb 8s ease-in-out infinite; }
        .bg-orb:nth-child(1) { width: 400px; height: 400px; background: linear-gradient(135deg, #48dbfb, #0abde3); top: -100px; right: -100px; }
        .bg-orb:nth-child(2) { width: 300px; height: 300px; background: linear-gradient(135deg, #ff9ff3, #f368e0); bottom: -80px; left: -80px; animation-delay: -3s; }
        @keyframes floatOrb { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-30px) scale(1.05); } 66% { transform: translate(-20px,20px) scale(0.95); } }
        .container { position: relative; z-index: 10; text-align: center; padding: 20px; max-width: 420px; width: 100%; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.85rem; margin-bottom: 30px; transition: color 0.3s; }
        .back-link:hover { color: rgba(255,255,255,0.8); }
        .logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #48dbfb, #0abde3); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 8px 32px rgba(72,219,251,0.3); margin-bottom: 16px; }
        .title { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.5); font-size: 0.85rem; font-weight: 300; margin-bottom: 32px; }
        .login-card { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 32px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { display: block; color: rgba(255,255,255,0.6); font-size: 0.8rem; font-weight: 400; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; color: #fff; font-size: 0.95rem; font-family: 'Poppins', sans-serif; outline: none; transition: all 0.3s; }
        .form-input::placeholder { color: rgba(255,255,255,0.3); }
        .form-input:focus { border-color: #48dbfb; box-shadow: 0 0 0 3px rgba(72,219,251,0.15); }
        .login-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #48dbfb, #0abde3); border: none; border-radius: 14px; color: #fff; font-size: 1rem; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(72,219,251,0.35); }
        .login-btn:active { transform: translateY(0); }
        .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; color: rgba(255,255,255,0.3); font-size: 0.8rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
        .google-btn { width: 100%; padding: 14px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; color: #fff; font-size: 0.9rem; font-weight: 400; font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .google-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
        .kakao-btn { width: 100%; padding: 14px; background: #FEE500; border: none; border-radius: 14px; color: #191919; font-size: 0.9rem; font-weight: 500; font-family: 'Poppins',sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s; margin-top: 10px; }
        .kakao-btn:hover { filter: brightness(0.95); transform: translateY(-1px); }
        .naver-btn { width: 100%; padding: 14px; background: #03C75A; border: none; border-radius: 14px; color: #fff; font-size: 0.9rem; font-weight: 500; font-family: 'Poppins',sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s; margin-top: 10px; }
        .naver-btn:hover { filter: brightness(0.9); transform: translateY(-1px); }
        .signup-text { margin-top: 24px; color: rgba(255,255,255,0.4); font-size: 0.8rem; }
        .signup-text a { color: #48dbfb; text-decoration: none; font-weight: 500; }
        .signup-text a:hover { text-decoration: underline; }
        .container { opacity: 0; animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
        @media (max-width: 480px) { .login-card { padding: 24px; } .title { font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="container">
        <a href="index.html" class="back-link">← 대시보드로 돌아가기</a>
        <div class="logo-icon">👤</div>
        <h1 class="title">로그인</h1>
        <p class="subtitle">계정에 로그인하여 학습을 시작하세요</p>
        <div class="login-card">
            <form onsubmit="event.preventDefault(); alert('로그인 기능은 준비 중입니다!');">
                <div class="form-group">
                    <label class="form-label">이메일</label>
                    <input type="email" class="form-input" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">비밀번호</label>
                    <input type="password" class="form-input" placeholder="비밀번호를 입력하세요">
                </div>
                <button type="submit" class="login-btn">로그인</button>
            </form>
            <div class="divider">또는</div>
            <button class="google-btn" onclick="alert('Google 로그인은 준비 중입니다!');">
                <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
                Google로 로그인
            </button>
            <button class="kakao-btn" type="button">
                <svg width="20" height="20" viewBox="0 0 20 20"><path fill="#191919" d="M10 3C5.58 3 2 5.87 2 9.32c0 2.17 1.42 4.08 3.58 5.18l-.91 3.38c-.08.29.26.52.5.34l3.96-2.62c.28.03.57.05.87.05 4.42 0 8-2.87 8-6.33S14.42 3 10 3z"/></svg>
                카카오로 로그인
            </button>
            <button class="naver-btn" type="button">
                <svg width="20" height="20" viewBox="0 0 20 20"><path fill="#fff" d="M13.36 10.63L6.4 2H2v16h4.64V9.37L13.6 18H18V2h-4.64z"/></svg>
                네이버로 로그인
            </button>
            <p class="signup-text">계정이 없으신가요? <a href="#">회원가입</a></p>
        </div>
    </div>
</body>
</html>
